<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f4f3f0">
  <title>こころのガチャ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-time="afternoon" data-mood="calm">

  <!-- ===== SVG アイコン定義 ===== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-flame" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2c.5 2.5-1 3.5-2 5.5-1.2 2.4-1 4.2.5 5.5 1.4-1.2 2-2.8 1.8-4.6 1.5 1.4 3.2 3.6 3.2 6.6 0 3.5-2.5 6-5.5 6s-5.5-2.4-5.5-5.6c0-2.4 1-3.6 2.5-4.6-.4 1.4.1 2.6 1 3.4-1.4-2.8.3-4.3 1.5-5.7C10.7 6.7 11.5 4.6 12 2z"/>
      </symbol>

      <symbol id="i-gear" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 8.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zm8.5 4.5l1.5-1.3-1-1.7-1.9.5c-.4-.4-.9-.7-1.4-.9l-.4-1.9h-2l-.4 1.9c-.5.2-1 .5-1.4.9l-1.9-.5-1 1.7L11.6 13l-1.5 1.3 1 1.7 1.9-.5c.4.4.9.7 1.4.9l.4 1.9h2l.4-1.9c.5-.2 1-.5 1.4-.9l1.9.5 1-1.7L20.5 13z"/>
      </symbol>

      <symbol id="i-cloud" viewBox="0 0 24 24">
        <path fill="currentColor" d="M19 18H7c-2.5 0-4.5-2-4.5-4.5S4.5 9 7 9c.3-2.8 2.7-5 5.5-5s5.2 2.2 5.5 5c2.2.2 4 2 4 4.5S21.2 18 19 18z"/>
      </symbol>

      <symbol id="i-rain" viewBox="0 0 24 24">
        <path fill="currentColor" d="M18 14H6.5C4.5 14 3 12.5 3 10.5S4.5 7 6.5 7C7 5 9 3.5 11.5 3.5S16 5 16.5 7c1.8.2 3.5 1.7 3.5 3.7S20 14 18 14z"/>
        <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M8 17l-1 3M12 17l-1 3M16 17l-1 3"/>
      </symbol>

      <symbol id="i-leaf" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 4c-1 8-6 14-15 16 .4-1.5 1-2.8 1.8-4C4.5 14.5 3 11.5 3 9c0-3 2-5 5-5 3.4 0 5 2 8 2 1.5 0 3-.4 4-2z"/>
        <path fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.7" d="M7 17c3-3 6-5 10-7"/>
      </symbol>

      <symbol id="i-fire" viewBox="0 0 24 24">
        <path fill="currentColor" d="M14 3c0 2.5-1 4-2.5 5.5-1.4 1.4-2.5 3-2 5.5 1-1 2-1.5 3-2-.5 1.5 0 3 1 4 2-2 3-4.5 3-7 0-2-1-4-2.5-6zM9 14c-1 1-2 2-2 4 0 3 2 5 5 5s5-2 5-5c0-2-1-3-2-4-1 1.5-2 2.5-3 3-1 0-2-1-3-3z"/>
      </symbol>

      <symbol id="i-gift" viewBox="0 0 24 24">
        <path fill="currentColor" d="M5 10v10c0 .5.5 1 1 1h12c.5 0 1-.5 1-1V10H5zm6 9H7v-7h4v7zm6 0h-4v-7h4v7zM20 5h-3.2c.4-.5.7-1.1.7-2 0-1.7-1.3-3-3-3-1.5 0-2.5 1-3 2.3-.5-1.3-1.5-2.3-3-2.3-1.7 0-3 1.3-3 3 0 .9.3 1.5.7 2H4c-.5 0-1 .5-1 1v3h18V6c0-.5-.5-1-1-1zm-7-2c0-.6.4-1 1-1s1 .4 1 1-.4 1-1 1-1-.4-1-1zm-5 0c0-.6.4-1 1-1s1 .4 1 1-.4 1-1 1-1-.4-1-1z"/>
      </symbol>

      <symbol id="i-book" viewBox="0 0 24 24">
        <path fill="currentColor" d="M5 4v15c0 1.1.9 2 2 2h12V3H7c-1.1 0-2 .9-2 2v-1zm2 0h11v15H7V4zm2 3v2h7V7H9zm0 4v2h7v-2H9z"/>
      </symbol>

      <symbol id="i-heart" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 20.7L4.7 13.3c-2.2-2.2-2.2-5.8 0-8 2-2 5.3-2.2 7.3-.3 2-1.9 5.3-1.7 7.3.3 2.2 2.2 2.2 5.8 0 8L12 20.7z"/>
      </symbol>

      <symbol id="i-heart-o" viewBox="0 0 24 24">
        <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" d="M12 20.7L4.7 13.3c-2.2-2.2-2.2-5.8 0-8 2-2 5.3-2.2 7.3-.3 2-1.9 5.3-1.7 7.3.3 2.2 2.2 2.2 5.8 0 8L12 20.7z"/>
      </symbol>

      <symbol id="i-share" viewBox="0 0 24 24">
        <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M12 4v13M7.5 8.5L12 4l4.5 4.5M5 15v4a1 1 0 001 1h12a1 1 0 001-1v-4"/>
      </symbol>

      <symbol id="i-sparkle" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6L12 2z"/>
      </symbol>

      <symbol id="i-capsule" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 3a9 9 0 100 18 9 9 0 000-18zm0 2a7 7 0 016.9 6H5.1A7 7 0 0112 5z"/>
      </symbol>

      <symbol id="i-close" viewBox="0 0 24 24">
        <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/>
      </symbol>

      <!-- ガチャマシン (画像が無い場合のフォールバック用) -->
      <symbol id="i-gacha-machine" viewBox="0 0 200 220">
        <!-- 影 -->
        <ellipse cx="100" cy="210" rx="65" ry="6" fill="rgba(0,0,0,0.12)"/>
        <!-- 機体ベース -->
        <rect x="35" y="130" width="130" height="70" rx="10" fill="#e6c79a"/>
        <rect x="35" y="130" width="130" height="14" rx="10" fill="#d4ad70"/>
        <!-- グローブ -->
        <circle cx="100" cy="85" r="60" fill="#fdfdfd" stroke="#c9a875" stroke-width="3"/>
        <circle cx="100" cy="85" r="56" fill="url(#globeGradient)"/>
        <!-- カプセル達 -->
        <g>
          <circle cx="75" cy="70" r="11" fill="#fbd5c0"/>
          <circle cx="75" cy="70" r="11" fill="url(#capsuleShine)"/>
        </g>
        <g>
          <circle cx="110" cy="90" r="10" fill="#c7e4d4"/>
          <circle cx="110" cy="90" r="10" fill="url(#capsuleShine)"/>
        </g>
        <g>
          <circle cx="120" cy="65" r="9" fill="#d4cce8"/>
          <circle cx="120" cy="65" r="9" fill="url(#capsuleShine)"/>
        </g>
        <g>
          <circle cx="85" cy="100" r="8" fill="#f5e6b8"/>
          <circle cx="85" cy="100" r="8" fill="url(#capsuleShine)"/>
        </g>
        <g>
          <circle cx="95" cy="78" r="6" fill="#ffd76b"/>
          <circle cx="95" cy="78" r="6" fill="url(#capsuleShine)"/>
        </g>
        <!-- ハンドル -->
        <circle cx="100" cy="160" r="14" fill="#9d7a4a"/>
        <circle cx="100" cy="160" r="11" fill="#b88c5a"/>
        <circle cx="106" cy="156" r="3" fill="#5d4220"/>
        <!-- 出口 -->
        <rect x="78" y="178" width="44" height="18" rx="4" fill="#8a6a3e"/>
        <rect x="82" y="182" width="36" height="10" rx="2" fill="#5d4220" opacity="0.5"/>
        <!-- コインスロット -->
        <rect x="140" y="158" width="4" height="14" rx="1" fill="#5d4220"/>
        <!-- ハイライト -->
        <ellipse cx="80" cy="60" rx="15" ry="8" fill="rgba(255,255,255,0.4)"/>
      </symbol>

      <!-- グラデーション定義 -->
      <linearGradient id="globeGradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
        <stop offset="100%" stop-color="rgba(240,240,240,0.5)"/>
      </linearGradient>
      <radialGradient id="capsuleShine" cx="0.3" cy="0.3" r="0.5">
        <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
    </defs>
  </svg>

  <!-- ===== アンビエント背景 (粒子) ===== -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient-bg"></div>
    <div class="particles" id="particles"></div>
  </div>

  <div class="app">

    <!-- ===== アプリヘッダー ===== -->
    <header class="app-header">
      <div class="streak-badge" id="streak-badge" title="連続日数">
        <svg class="icon"><use href="#i-flame"></use></svg>
        <span id="streak-count" class="streak-count" data-value="0">0</span>
      </div>
      <h1 class="app-title">こころのガチャ</h1>
      <button id="settings-btn" class="icon-btn" type="button" aria-label="設定">
        <svg class="icon"><use href="#i-gear"></use></svg>
      </button>
    </header>

    <!-- ===== メインコンテンツ ===== -->
    <main class="app-main">

      <!-- ============ 今日タブ ============ -->
      <section id="view-today" class="view view-today active">

        <!-- 今日のひとこと (1日1回) -->
        <div id="daily-card" class="daily-card">
          <div class="daily-header">
            <span class="daily-label">今日のひとこと</span>
            <span id="daily-date" class="daily-date">--</span>
          </div>
          <div id="daily-content" class="daily-content daily-locked">
            <svg class="daily-lock-icon"><use href="#i-gift"></use></svg>
            <p class="daily-prompt">タップして今日の言葉を開く</p>
          </div>
        </div>

        <!-- 気分セレクター -->
        <div class="mood-selector">
          <p class="mood-question">いまの気分は？</p>
          <div class="mood-options" role="radiogroup">
            <button class="mood-btn" data-mood="anxious" type="button">
              <svg class="mood-icon"><use href="#i-cloud"></use></svg>
              <span class="mood-label">不安</span>
            </button>
            <button class="mood-btn" data-mood="tired" type="button">
              <svg class="mood-icon"><use href="#i-rain"></use></svg>
              <span class="mood-label">疲れ</span>
            </button>
            <button class="mood-btn active" data-mood="calm" type="button">
              <svg class="mood-icon"><use href="#i-leaf"></use></svg>
              <span class="mood-label">穏やか</span>
            </button>
            <button class="mood-btn" data-mood="motivated" type="button">
              <svg class="mood-icon"><use href="#i-fire"></use></svg>
              <span class="mood-label">燃えてる</span>
            </button>
          </div>
        </div>

        <!-- ガチャマシーン -->
        <div id="gacha-machine" class="gacha-machine">
          <img src="img/gacha.png" alt="ガチャマシーン" class="gacha-image"
               onerror="this.style.display='none'; document.getElementById('gacha-fallback').style.display='flex';">
          <div id="gacha-fallback" class="gacha-fallback">
            <svg viewBox="0 0 200 220" class="gacha-svg">
              <use href="#i-gacha-machine"></use>
            </svg>
          </div>
          <div class="machine-aura"></div>
          <div id="confirmation-glow" class="confirmation-glow"></div>
        </div>

        <button id="gacha-button" class="gacha-button" type="button">
          <span class="gacha-button-text">ガチャを回す</span>
        </button>
        <p id="pity-text" class="pity-text"></p>

        <!-- 結果カード -->
        <div id="result-card" class="result-card result-empty">
          <div class="result-header">
            <span id="new-badge" class="new-badge">NEW!</span>
            <button id="favorite-btn" class="favorite-btn" type="button" aria-label="お気に入り" aria-pressed="false">
              <svg class="icon"><use href="#i-heart-o"></use></svg>
            </button>
          </div>
          <div class="capsule-icon"></div>
          <p id="category" class="category">今日のカプセル</p>
          <p id="message" class="message">ボタンを押すと、言葉が出てきます。</p>
          <div class="result-actions">
            <button id="share-btn" class="share-btn" type="button" disabled>
              <svg class="icon-sm"><use href="#i-share"></use></svg>
              <span>シェア</span>
            </button>
          </div>
        </div>

        <!-- 統計エリア -->
        <div class="status-area">
          <p id="count-text" class="count-text">回した回数：<span data-counter="count">0</span>回</p>
          <p id="collection-text" class="collection-text">コレクション：<span data-counter="collected">0</span> / 40</p>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
            <div class="progress-milestones">
              <span class="milestone" data-at="25"></span>
              <span class="milestone" data-at="50"></span>
              <span class="milestone" data-at="75"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- ============ 図鑑タブ ============ -->
      <section id="view-collection" class="view view-collection">
        <div class="section-header">
          <h2 class="section-title">こころの図鑑</h2>
          <p class="section-sub"><span id="coll-num">0</span> / 40 種類取得</p>
        </div>
        <div class="collection-filters">
          <button class="filter-btn active" data-filter="all" type="button">すべて</button>
          <button class="filter-btn" data-filter="SSR" type="button">SSR</button>
          <button class="filter-btn" data-filter="SR" type="button">SR</button>
          <button class="filter-btn" data-filter="R" type="button">R</button>
          <button class="filter-btn" data-filter="N" type="button">N</button>
        </div>
        <div id="collection-grid" class="collection-grid"></div>
      </section>

      <!-- ============ マイカードタブ ============ -->
      <section id="view-favorites" class="view view-favorites">
        <div class="section-header">
          <h2 class="section-title">マイカード</h2>
          <p class="section-sub"><span id="fav-num">0</span> 件保存中</p>
        </div>
        <div id="favorites-list" class="favorites-list"></div>
        <p id="favorites-empty" class="favorites-empty">
          まだお気に入りはありません。<br>
          気に入ったメッセージに <svg class="icon-inline"><use href="#i-heart-o"></use></svg> をタップして保存できます。
        </p>
      </section>

    </main>

    <!-- ===== ボトムナビゲーション ===== -->
    <nav class="app-nav">
      <button class="nav-btn active" data-view="today" type="button">
        <svg class="nav-icon"><use href="#i-capsule"></use></svg>
        <span class="nav-label">今日</span>
      </button>
      <button class="nav-btn" data-view="collection" type="button">
        <svg class="nav-icon"><use href="#i-book"></use></svg>
        <span class="nav-label">図鑑</span>
        <span id="nav-collection-dot" class="nav-dot"></span>
      </button>
      <button class="nav-btn" data-view="favorites" type="button">
        <svg class="nav-icon"><use href="#i-heart-o"></use></svg>
        <span class="nav-label">マイカード</span>
      </button>
    </nav>

  </div>

  <!-- ===== 設定モーダル ===== -->
  <div id="settings-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="settings-modal"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">設定</h2>
        <button class="modal-close" data-close="settings-modal" type="button" aria-label="閉じる">
          <svg class="icon"><use href="#i-close"></use></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <span class="setting-label">サウンド</span>
          <label class="toggle">
            <input type="checkbox" id="sound-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span class="setting-label">ガチャ総回数</span>
          <span id="settings-count" class="setting-value">0</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">連続日数</span>
          <span id="settings-streak" class="setting-value">0 日</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">最長記録</span>
          <span id="settings-max-streak" class="setting-value">0 日</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">天井までの残り</span>
          <span id="settings-pity" class="setting-value">--</span>
        </div>
        <button id="reset-btn" class="danger-btn" type="button">すべてのデータをリセット</button>
      </div>
    </div>
  </div>

  <!-- ===== カード詳細モーダル ===== -->
  <div id="card-detail-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="card-detail-modal"></div>
    <div class="modal-content card-detail-content">
      <button class="modal-close" data-close="card-detail-modal" type="button" aria-label="閉じる">
        <svg class="icon"><use href="#i-close"></use></svg>
      </button>
      <div id="card-detail-body" class="card-detail-body"></div>
    </div>
  </div>

  <!-- ===== シェア画像生成モーダル ===== -->
  <div id="share-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="share-modal"></div>
    <div class="modal-content share-content">
      <button class="modal-close" data-close="share-modal" type="button" aria-label="閉じる">
        <svg class="icon"><use href="#i-close"></use></svg>
      </button>
      <h2 class="modal-title">シェア</h2>
      <canvas id="share-canvas" width="600" height="600"></canvas>
      <div class="share-actions">
        <a id="share-download" class="share-action-btn" download="kokoro-gacha.png">画像をダウンロード</a>
        <button id="share-copy" class="share-action-btn share-action-btn-outline" type="button">テキストをコピー</button>
      </div>
    </div>
  </div>

  <!-- ===== SSR全画面オーバーレイ ===== -->
  <div id="ssr-overlay" class="ssr-overlay" aria-hidden="true">
    <div class="ssr-flash"></div>
    <div class="sparkles">
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
      <svg><use href="#i-sparkle"></use></svg>
    </div>
  </div>

  <!-- ===== トースト通知 ===== -->
  <div id="toast" class="toast"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
