<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- 背景（safe zone を考慮し全面塗り） -->
  <rect width="192" height="192" fill="#f4f3f0"/>

  <!-- カプセル本体（safe zone 内：中心 96,96 / 半径 60） -->
  <g>
    <!-- カプセル下半分（濃色） -->
    <path d="M 36 96 A 60 60 0 0 0 156 96 Z" fill="#1a1a1a"/>
    <!-- カプセル上半分（淡色アウトライン） -->
    <path d="M 36 96 A 60 60 0 0 1 156 96 Z" fill="#f4f3f0" stroke="#1a1a1a" stroke-width="4"/>
    <!-- 中央の合わせ目 -->
    <line x1="36" y1="96" x2="156" y2="96" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 「こ」を上半分に配置（カプセル＝中身に「心」が入るイメージ） -->
  <text x="96" y="82"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif"
        font-size="56"
        font-weight="600"
        fill="#1a1a1a"
        text-anchor="middle"
        dominant-baseline="middle">こ</text>
</svg>
